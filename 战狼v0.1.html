<!DOCTYPE html>
<html>

<head>
    <title>UI</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --accent-color: #fd79a8;
            --text-color: #2d3436;
            --bg-color: #f8f9f;
            --card-bg: #ffffff;
            --border-color: #dfe6e9;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --border-radius: 12px;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-scale: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .pngLast {
            width: 90%;

        }

        .phonebutton {
            background-color: #6c5ce7;
            color: white;
            width: 100px;
            height: 50px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
        }

        .goto-button {
            background-color: #6c5ce7;
            position: relative;
            color: white;
            min-width: 40px;
            height: 50px;
            float: left;
            border: 2px solid var(--border-color);
            border-radius: 10px;
        }

        .goto-button:hover {
            background-color: #a29bfe;
            color: white;
            min-width: 40px;
            height: 50px;
            float: left;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
        }

        .phonebutton:hover {
            background-color: #a29bfe;
            color: white;
            width: 100px;
            height: 50px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
        }

        body {
            font-family: var(--font-family);

            color: var(--text-color);
            line-height: 1.6;

            font-size: calc(16px * var(--font-scale));
        }

        .main-container {
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            margin: 0;
            width: 100%;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .main-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 24px;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 8px 8px 0 0;
        }

        .say {
            color: var(--text-color);
            line-height: 1.6;
            text-align: justify;
            opacity: 1;
            margin: 12px 0;
            padding: 16px;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            font-size: calc(16px * var(--font-scale));
        }

        .character-container {
            position: relative;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            margin: 16px 0;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .background {
            z-index: 0;
        }

        .buy-button {
            float: right;
            width: 50px;
            border: 3px solid #73AD21;
            padding: 0px;

        }

        .CG {
            z-index: 1;
        }

        .frame {
            z-index: 2;
        }

        .time {
            z-index: 3;
            margin-bottom: 16px;
            text-align: center;
        }

        .time-message {
            display: inline-block;
            background-color: #E8F3FF;
            border-radius: 18px;
            padding: 10px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            font-size: calc(14px * var(--font-scale));
            color: #2980b9;
            font-weight: 600;
            text-align: center;
        }

        .chat-container {
            max-width: 100%;
            width: 100%;
            padding: 12px 0;
            box-sizing: border-box;
        }

        .displaybutton {
            display: flex;
            width: 95%;
            padding: 0px;
            gap: 1%;
        }

        .user-input {
            display: flex;
            width: 95%;
            padding: 0px;
            gap: 1%;
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 1px;

        }

        .chat-window {
            display: flex;
            align-items: flex-start;
            background-color: transparent;
            border-radius: var(--border-radius);
            padding: 0;
            box-shadow: none;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            opacity: 1;
            border: 2px solid var(--secondary-color);
            box-shadow: var(--shadow);
        }

        .message {
            font-family: inherit;
            flex: 1;
            padding: 14px;
            font-weight: 500;
            color: var(--text-color);
            word-wrap: break-word;
            overflow-wrap: break-word;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            line-height: 1.5;
            font-size: calc(16px * var(--font-scale));
        }

        .UI4 {
            z-index: 4;
            width: calc(50% - 8px);
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            position: relative;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            float: right;
        }

        .UI6 {
            background-color: #EDEDED;
            width: 95%;
            height: 20px;
            z-index: 1;
            border-radius: 10px;
            position: relative;
            top: 50%;
            text-align: center;

        }

        .UI5 {
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            height: 20px;
            z-index: 2;
            border-radius: 10px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: calc(var(--hentai, 50) * 1%);
        }

        .UI5-1 {
            background: linear-gradient(90deg, #fd79a8, #e84393);
            width: calc(var(--love, 50) * 1%);
        }

        .UI5-2 {
            background: linear-gradient(90deg, #35ffc2, #3784f7);
            width: calc(var(--love, 50) * 1%);
        }

        .UI7 {
            z-index: 3;
            width: 50%;
            position: absolute;
            top: 30%;
            left: 45%;
            border-radius: 10px;
            margin: 0;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            color: var(--text-color);
            background-color: #EDEDED;
        }


        .illustration {
            max-width: 100%;
            border-radius: var(--border-radius);
            margin: 16px 0;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .controls {
            position: fixed;
            bottom: calc(50px + 30px * var(--font-scale));
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 500px;
            z-index: 100;
            opacity: 0.95;
            display: none;
        }

        .controls h2 {
            margin-bottom: 16px;
            font-size: calc(20px * var(--font-scale));
            color: var(--primary-color);
            text-align: center;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stats-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stats-container {
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }

        #fontSizeSlider {
            flex: 1;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            outline: none;
            border-radius: 4px;
            min-width: 150px;
        }

        #fontSizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #fontSizeSlider::-webkit-slider-thumb:hover {
            background: var(--secondary-color);
        }

        #fontSizeValue {
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            font-size: calc(16px * var(--font-scale));
        }

        #textsize {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-size: calc(16px * var(--font-scale));
        }

        .testtext {
            border: 1px solid var(--border-color);
            background-color: #2d3436;
            color: white;
            float: inline-end;
        }

        .textsize {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-size: calc(16px * var(--font-scale));
        }

        .textsize:hover {
            background: var(--secondary-color);
        }

        #textsize:hover {
            background: var(--secondary-color);
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .main-container {
                padding: 20px 16px;
                border-radius: 12px;
            }



            .UI4 {
                width: 100%;
            }

            .character-container {
                aspect-ratio: 3/4;
            }

            .say {
                padding: 14px;
            }

            .message {
                padding: 12px;
            }

            .slider-container {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            #fontSizeSlider {
                width: 100%;
            }

            .controls {
                width: 95%;
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .avatar {
                width: 42px;
                height: 42px;
            }

            .UI7 {
                font-size: calc(12px * var(--font-scale));
            }

            .time-message {
                font-size: calc(13px * var(--font-scale));
                padding: 8px 16px;
            }

            .controls h2 {
                font-size: calc(18px * var(--font-scale));
            }
        }

        .phonePic {
            width: 100px;
            height: 100px;
            border: 5px solid var(--border-color);
            border-radius: 100%;
            box-shadow: var(--shadow);
            display: block;
            margin: 0 auto;
            float: left;
        }

        .phonedisappearbutton {
            width: 100px;
            height: 50px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
        }

        .map {
            line-height: 0%;
            width: 460px;
            height: 460px;
            background-color: #2d3436;
        }

        .mapimg {
            width: 100%;
            height: 100%;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            z-Index: 1;
            position: absolute;
        }

        #maps {
            position: absolute;
            width: 460px;
            height: 460px;
        }

        .location {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: var(--accent-color);
            border-radius: 50%;
            border: 2px solid var(--border-color);
            z-index: 5;
        }

        .tooltip {
            line-height: normal;
            background-color: white;
            width: 110px;
            position: absolute;
            border: black 1px solid;
            transform: translateY(-50%);
            color: var(--tooltip-color);
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            z-index: 10;
        }

        .close-btn {
            z-index: 50;
            position: absolute;
            top: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #6c5ce7;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .close-btn:hover {
            background-color: #5b4bd8;
        }

        .close-btn::before,
        .close-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 2px;
            background-color: white;
            border-radius: 1px;
        }

        .close-btn::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .close-btn::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }
    </style>
</head>

        }

            // 处理对话文本
            async function catchAndReplace(text) {
                const Regen1_front = /^([^\<]+)(?=\<)/m;
                const Regen1_back = /\>([\s\S]+?)(?=\<|$)/g;
                const Regen2 = /\<[^\>]*?[:：]([^\>]*?)\>/g;
                const Regen3 = /\<.*?-([\s\S]*?)\>/g;
                //提供正则接口给ai,让其能在对话时能够让背包中的指定物品变成指定的数量
                const Regen4 = /\<set-([\s\S]*?)-(\d+)\>/g;
                //提供正则接口给ai,让其能在对话时删除背包中的指定物品
                const Regen5 = /\<delete-([\s\S]*?)\>/g;
                //提供正则接口给ai,让其能够在对话时向背包中增加指定物品
                const Regen6 = /\<add-([\s\S]*?)-(\d+)\>/g;
                console.log("进入catchAndReplace，文本为：" + text);
                let i = 0;
                const dialogue = [];
                dialogue.length = 0;
                await refreshdisplay();
                let match;
                Regen1_front.lastIndex = 0;
                if ((match = Regen1_front.exec(text)) !== null) {
                    if (match[1]) {
                        dialogue.push({
                            text: match[1],
                            index: match.index,
                            type: 'type1_front'
                        });
                    }
                }

                Regen1_back.lastIndex = 0;
                while ((match = Regen1_back.exec(text)) !== null) {
                    if (match[1]) {
                        dialogue.push({
                            text: match[1],
                            index: match.index,
                            type: 'type1_back'
                        });
                    }
                }

                Regen2.lastIndex = 0;
                while ((match = Regen2.exec(text)) !== null) {
                    dialogue.push({
                        text: match[1],
                        index: match.index,
                        type: 'type2'
                    });
                }
                Regen3.lastIndex = 0;
                while ((match = Regen3.exec(text)) !== null) {
                    dialogue.push({
                        text: match[1],
                        index: match.index,
                        type: 'type3'
                    });

                }
                Regen4.lastIndex = 0;
                while ((match = Regen4.exec(text)) !== null) {
                    dialogue.push({
                        text: match[1], number: match[2],
                        index: match.index,
                        type: 'type4'
                    });
                }
                Regen6.lastIndex = 0;
                while ((match = Regen6.exec(text)) !== null) {
                    dialogue.push({
                        text: match[1], number: match[2],
                        index: match.index,
                        type: 'type6'
                    });
                }

                dialogue.sort((a, b) => a.index - b.index);
                console.log("dialogue:", dialogue);

                while (i < dialogue.length) {
                    if ((dialogue[i].type === 'type1_front' || dialogue[i].type === 'type1_back') && dialogue[i].text.trim() !== '') {
                        display.insertAdjacentHTML('beforeend', `<p class="say">${dialogue[i].text}</p>`);
                    } else if (dialogue[i].type === 'type2') {

                        display.insertAdjacentHTML('beforeend', `<div class="chat-container">
                <div class="chat-window">
                    <img  loading="lazy" src="https://files.catbox.moe/tkbhft.png" alt="头像" class="avatar">
                    <div class="message">
                        ${dialogue[i].text}
                    </div>
                </div>
            </div>`);
                    } else if (dialogue[i].type === 'type3' && dialogue[i].text.trim() !== '') {
                        display.insertAdjacentHTML('beforeend', `<img class="pngLast" src="https://files.catbox.moe/${dialogue[i].text}.png" loading="lazy" alt="插图" class="illustration">`);
                        console.log('插入图片：https://files.catbox.moe/' + dialogue[i].text + '.png');
                        /*  await setVar('LastImage', dialogue[i].text);
     
                          if (!img) {
                              await setVar('img', dialogue[i].text);
                          } else {
     
                              await setVar('img', imgrepalce(img + "," + dialogue[i].text));
     
                          }
                          img = await getVar('img');*/


                    } else if (dialogue[i].type === 'type4')//调用变化物品接口
                    {
                        changeitem(dialogue[i].text, dialogue[i].number);

                    } else if (dialogue[i].type === 'type6')//调用增加物品接口
                    {
                        additem(dialogue[i].text, dialogue[i].number);

                    }

                    i++;
                }
            }

            async function changeitem(itemName, itemnumber) {

                    bagData[itemName].number = itemnumber;

                    bagData[itemName].number = itemnumber;
                } else {
                    bagData[itemName] = { number: itemnumber };
                }
                await setVar('bag', JSON.stringify(bagData));

        //打开背包按钮
        bag.addEventListener('click', async function openbag() {
            let bagData = await getVar('bag');
            let bagObj = {};
            console.log('打开背包:', bagData);
            if (bagData) {
                try {
                    //尝试为获取到的每个对象创建一个显示

                    bagdisplay.replaceChildren();
                    bagObj = bagData;
                    bagdisplay.insertAdjacentHTML('beforeend', `<button class="phonebutton phonedisappearbutton">关闭</button>`);
                    document.querySelectorAll(".phonedisappearbutton").forEach(button => {
                        button.addEventListener("click", function () {
                            friend.style.display = "none";
                            shop.style.display = "none";
                            displayphone.style.display = "none";
                            displaytextsize.style.display = "none";
                            display.style.display = "none";
                            bagdisplay.style.display = "none";
                            flag = false;
                        });
                    });
                    for (const [name, { number }] of Object.entries(bagObj)) {
                        const itemDiv = document.createElement("div");
                        itemDiv.textContent = `${name} x${number}`;
                        bagdisplay.appendChild(itemDiv);
                    }
                    bagdisplay.style.display = "block";
                    console.log('解析背包数据成功:', bagObj);
                } catch (err) {
                    bagObj = {};
                    console.error('解析背包数据时出错:', err);
                }
            } else {
                bagObj = {};
                console.log('背包为空，初始化为新对象');
            }
        });
        //map显示
        mapbutton.addEventListener("click", function () {
            //地图动态添加

                map.style.display = "block";
            } else {
                map.style.display = "none";
            }
        });
        const mapContainer = document.getElementsByClassName('map')[0];
        mapContainer.style.padding = '0px';
        mapContainer.style.position = 'relative';

        locations.forEach(location => {
            if (location.printed === false) {
                location.printed = true;
                const locationDiv = document.createElement('div');
                locationDiv.classList.add('location');
                locationDiv.style.left = location.x + '%';
                locationDiv.style.top = location.y + '%';
                locationDiv.style.padding = '0px';
                const localname = document.createElement('div');
                localname.textContent = location.name;
                localname.style.width = 'max-content';
                localname.style.lineHeight = 'normal';
                localname.style.color = 'black';
                localname.style.fontSize = '12px';
                localname.style.fontFamily = 'Arial, sans-serif';
                localname.style.position = 'absolute';
                localname.style.top = '120%';
                localname.style.transform = 'translateX(-30%)';
                localname.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
                locationDiv.appendChild(localname);
                //提示框
                const tooltip = document.createElement('div');
                tooltip.classList.add('tooltip');
                const tooltipText = document.createElement('div');
                tooltipText.classList.add('tooltip-text');
                tooltip.appendChild(tooltipText);
                //局部地图
                const SubMap = document.createElement('button');
                SubMap.textContent = '局部地图';
                SubMap.classList.add('goto-button');
                SubMap.addEventListener('click', async function (ev) {
                    ev.stopPropagation();
                    if (location.Submaps) {
                        const SubMapImg = document.createElement('img');
                        SubMapImg.src = location.SubMapUrl;
                        SubMapImg.style.width = '460px';
                        SubMapImg.style.height = '460px';
                        SubMapImg.style.position = 'absolute';
                        //局部地图的层级高于原图,添加在原有地图容器中
                        SubMapImg.style.zIndex = '10';
                        //定义一个函数用来关闭局部地图
                        function closeSubMap() {
                            SubMapImg.remove();
                        }
                        //在局部地图上添加一个关闭按钮
                        const closeButton = document.createElement('button');
                        closeButton.textContent = '回到全图';
                        closeButton.style.position = 'absolute';
                        closeButton.classList.add('phonebutton');
                        closeButton.addEventListener('click', function (ev) {
                            ev.stopPropagation();
                            closeSubMap();
                            //清除按钮本身
                            closeButton.remove();
                        });
                        document.getElementById('MapButton').appendChild(closeButton);
                        document.getElementById('maps').appendChild(SubMapImg);

                    }
                });
                //探索按钮
                const explore = document.createElement('button');
                explore.textContent = '探索';
                explore.classList.add('goto-button');
                explore.addEventListener('click', async function (ev) {
                    ev.stopPropagation();
                    //结果判定完全程序化，不经过ai，将探索所得物品返回到背包.
                    //基本随机函数
                    const rand = Math.random();
                    if (rand < 0.1) {
                        await STsay(`我前往${location.name}进行探索,结果:成功`);
                    } else if (rand < 0.3 && rand >= 0.1) {
                        await STsay(`我前往${location.name}进行探索,结果:成功`);
                    } else if (rand < 0.6 && rand >= 0.3) {
                        await STsay(`我前往${location.name}进行探索,结果:一般`);
                    } else if (rand < 0.9 && rand >= 0.6) {
                        await STsay(`我前往${location.name}进行探索,结果:失败`);
                    }
                    map.style.display = "none";
                });
                //前往按钮


                const goto = document.createElement('button');
                const gotosay = document.createElement('input');
                gotosay.type = 'text';
                gotosay.placeholder = '请输入前往时的对话内容';
                goto.type = 'submit';
                goto.textContent = '前往';
                goto.classList.add('goto-button');
                gotosay.classList.add('goto-input');
                gotosay.style.marginBottom = '5px';
                gotosay.style.width = '90%';
                goto.addEventListener('click', async function (ev) {
                    ev.stopPropagation();
                    if (gotosay.value.trim() === '') {
                        alert('请输入对话内容后再前往');
                        return;
                    }
                    await STsay(`前往${location.name},{{user}}:${gotosay.value}`);
                    map.style.display = "none";
                });
                //贸易按钮
                const trade = document.createElement('button');
                trade.textContent = '贸易(未实现)';
                trade.classList.add('goto-button');
                //贸易的实现将完全采用程序化方式，不经过ai，也不发送结果，而是直接进入背包系统.
                trade.addEventListener('click', async function (ev) {
                    ev.stopPropagation();
                    //暂时不写，等待后续完善
                });
                tooltip.appendChild(SubMap);
                tooltip.appendChild(gotosay);
                tooltip.appendChild(goto);
                tooltip.appendChild(explore);
                tooltip.appendChild(trade);
                mapContainer.appendChild(locationDiv);
                locationDiv.appendChild(tooltip);

                // 点击定位点时展示提示框并阻止事件冒泡
                locationDiv.addEventListener('click', function (ev) {
                    ev.stopPropagation();
                    // 隐藏其他提示框
                    document.querySelectorAll('.tooltip').forEach(t => {
                        if (t !== tooltip) t.style.display = 'none';
                    });
                    // 设置提示内容并切换显示
                    tooltipText.textContent = `${location.name}: ${location.description}`;
                    tooltip.style.left = '25px';
                    tooltip.style.top = '0px';
                    tooltip.style.display = tooltip.style.display === 'block' ? 'block' : 'block';
                });
            }
        });

        // 点击页面其他地方时隐藏所有提示框（只添加一次）
        document.addEventListener('click', function () {
            document.querySelectorAll('.tooltip').forEach(t => t.style.display = 'none');
        });
